<header class="hero">
  <h1>Tommy Labs</h1>
  <p>A playground for small Angular experiments. Pick one to dive in.</p>
</header>

<section class="grid">
  @for (experiment of experiments; track experiment.slug) {
    <a class="card" [routerLink]="experiment.slug">
      <h2>{{ experiment.title }}</h2>
      <p>{{ experiment.description }}</p>
      <span class="open">Open &rarr;</span>
    </a>
  } @empty {
    <p>No experiments registered yet.</p>
  }
</section>
